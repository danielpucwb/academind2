{% if artefacts %}
<table class="w-full border-collapse text-sm">
  <thead class="border-b border-slate-700 text-xs uppercase tracking-wide text-slate-400">
    <tr>
      <th class="py-2 text-left font-medium">Ficheiro</th>
      <th class="py-2 font-medium text-right">Bytes</th>
      <th class="py-2 font-medium text-left">SHA256 · 12</th>
      <th class="py-2 font-medium text-right">Ações</th>
    </tr>
  </thead>
  <tbody class="divide-y divide-slate-800">
    {% for a in artefacts %}
      <tr>
        <td class="py-2 pr-2 text-teal-200">{{ a.original_filename }}</td>
        <td class="py-2 text-right text-slate-400">{{ a.byte_size }}</td>
        <td class="py-2 font-mono text-[11px] text-slate-500">{{ (a.sha256[:12]) ~ "…" }}</td>
        <td class="py-2 text-right">
          <form
            hx-post="/ui/cursos/{{ course.id }}/disciplinas/{{ disciplina.id }}/artefact-excluir"
            hx-target="#originals-list-root"
            hx-swap="innerHTML"
          >
            <input type="hidden" name="curso_id" value="{{ course.id }}" />
            <input type="hidden" name="artefact_id" value="{{ a.id }}" />
            <button type="submit" class="text-xs font-medium text-rose-400 hover:text-rose-300">Eliminar</button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-sm text-slate-500">Sem ficheiros catalogados nesta disciplina.</p>
{% endif %}
